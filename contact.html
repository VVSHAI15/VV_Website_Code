        <!-- ==================== CONTACT FORM ==================== -->
        <section class="contact-page-section" aria-label="Contact form">
            <div class="contact-inner">
                <p class="contact-subtext reveal">Whether you have a project in mind, want to collaborate, or simply want to connect &mdash; I'd love to hear from you.</p>

                <form action="https://api.web3forms.com/submit" method="POST" class="contact-form reveal reveal-delay-1">
                    <input type="hidden" name="access_key" value="949dea64-3b9a-4bc0-8b66-20b0d5e9dbd3">
                    <input type="checkbox" name="botcheck" style="display:none;" tabindex="-1" autocomplete="off">

                    <div class="form-field">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required autocomplete="name" placeholder="Your name">
                    </div>
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder="your@email.com">
                    </div>
                    <div class="form-field">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required rows="6" placeholder="Tell me about your project..."></textarea>
                    </div>
                    <div class="form-field">
                        <label for="captcha-answer-contact">Quick check: <span class="captcha-question"></span> = ?</label>
                        <input type="text" id="captcha-answer-contact" class="captcha-input" required autocomplete="off" inputmode="numeric" placeholder="Enter the answer">
                    </div>

                    <button type="submit" class="form-submit">Send Message</button>
                </form>
